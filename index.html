<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUS TIME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #0f172a; }
        .digital-font { font-family: 'Chakra Petch', sans-serif; }
        .bus-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        button { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        button:active { transform: scale(0.95); }
        .active-day { background-color: #f59e0b; color: #0f172a; font-weight: 900; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
        .active-stop { background-color: #2563eb; color: white; font-weight: 900; box-shadow: 0 4px 20px rgba(37, 99, 235, 0.5); }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-10">

    <div id="newsOverlay" class="hidden fixed inset-0 z-[100] bg-[#0f172a] overflow-y-auto">
        <div class="max-w-md mx-auto px-6 pt-10 pb-20">
            <div class="flex justify-between items-center mb-8">
                <h2 id="newsHeader" class="text-2xl font-black italic">INFORMATION</h2>
                <button onclick="closeNews()" class="bg-slate-800 px-4 py-2 rounded-full text-xs font-bold border border-slate-700">トップに戻る</button>
            </div>
            <div id="newsList" class="space-y-4"></div>
            <div id="newsDetail" class="hidden">
                <p id="detailDate" class="text-yellow-500 font-bold text-sm mb-1"></p>
                <h3 id="detailTitle" class="text-2xl font-black mb-4 leading-tight"></h3>
                <div id="detailContent" class="text-slate-300 leading-relaxed whitespace-pre-wrap border-t border-slate-800 pt-4"></div>
                <button onclick="showNewsList()" class="mt-8 text-blue-400 font-bold text-sm">← 一覧に戻る</button>
            </div>
        </div>
    </div>
    
<div class="sticky top-0 z-50 bg-[#0f172a]/95 backdrop-blur-md border-b border-slate-800 shadow-xl">
    <div class="max-w-md mx-auto px-6 pt-5 pb-3">
        <div class="flex justify-between items-center mb-4">
            
            <div class="w-12"> <button onclick="openNews()" class="p-2 bg-slate-800/50 rounded-full border border-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                </button>
            </div>

            <div class="flex-1 text-center">
                <div id="liveClock" class="digital-font text-5xl font-bold text-white tracking-wider leading-none">00:00</div>
            </div>

            <div class="w-24 text-right"> <p id="currentDayLabel" class="text-[10px] font-black text-yellow-500 tracking-widest uppercase italic leading-none mb-1">Checking...</p>
                <p id="currentStopLabel" class="text-lg font-black tracking-tighter text-white italic leading-tight">善光寺大門</p>
            </div>

        </div>

        <div class="mb-3">
            <select id="routeSelect" onchange="switchRoute(this.value)" class="w-full bg-slate-800 border border-slate-700 text-white text-sm rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                <option value="to_station">善光寺 ➔ 丹波島橋南 方面</option>
                <option value="to_zenkoji">丹波島橋南 ➔ 善光寺 方面</option>
            </select>
        </div>
    
            
            <div id="dayButtonGroup" class="flex bg-slate-900/50 rounded-lg p-1 border border-slate-800 mb-3 gap-1"></div>

            <div class="flex bg-slate-900 rounded-xl p-1 border border-slate-700">
                <button onclick="switchStop('stop1')" id="btn-stop1" class="flex-1 py-2.5 text-xs font-bold rounded-lg transition-all">善光寺大門</button>
                <button onclick="switchStop('stop2')" id="btn-stop2" class="flex-1 py-2.5 text-xs font-bold text-slate-500 rounded-lg transition-all">長野駅</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-6">
        <div id="nextBusContainer" class="space-y-4 text-center"></div>
        <button onclick="toggleAllList()" class="w-full mt-8 bg-slate-800/50 border border-slate-700 text-slate-400 py-4 rounded-2xl text-sm font-bold">全時刻表を表示</button>
        <div id="fullList" class="hidden mt-6 bg-slate-900/80 rounded-3xl p-6 border border-slate-800">
            <div id="fullListContent" class="space-y-4 h-[400px] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWcJ5BioNRhqVF7o6GfQJ8ui9OZSWD33M",
            authDomain: "bus-timetable-2d2a1.firebaseapp.com",
            databaseURL: "https://bus-timetable-2d2a1-default-rtdb.firebaseio.com/",
            projectId: "bus-timetable-2d2a1",
            storageBucket: "bus-timetable-2d2a1.firebasestorage.app",
            messagingSenderId: "G-LJCQFRZT8H",
            appId: "1:786927724439:web:ceee42521343fde00306d2"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentRoute = 'to_station';
        let currentStopId = 'stop1';
        let currentDayType = 'weekday'; 
        let allBusData = [];
        let allNews = [];

        // 判定ロジック
        async function checkTodayType() {
            const now = new Date();
            const day = now.getDay();
            let isHoliday = false;
            try {
                const res = await fetch(`https://api.national-holidays.jp/is_holiday?date=${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`);
                const result = await res.json();
                isHoliday = result.is_holiday;
            } catch (e) {}

            if (currentRoute === 'to_zenkoji') {
                if (isHoliday || day === 0) return 'sunday_holiday';
                if (day === 6) return 'saturday';
                return 'weekday';
            } else {
                return (isHoliday || day === 0 || day === 6) ? 'holiday' : 'weekday';
            }
        }

        // 時計の即時更新
        function updateClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('liveClock').innerText = `${hours}:${minutes}`;
        }

        window.switchRoute = async (val) => {
            currentRoute = val;
            document.getElementById('btn-stop1').innerText = (val === 'to_station') ? "善光寺大門" : "丹波島橋南";
            currentDayType = await checkTodayType();
            updateUI();
            loadData();
        };

        window.switchDay = (type) => { currentDayType = type; updateUI(); loadData(); };
        window.switchStop = (id) => {
            currentStopId = id;
            document.getElementById('currentStopLabel').innerText = document.getElementById(`btn-${id}`).innerText;
            updateUI();
            loadData();
        };

        function updateUI() {
            const labelMap = { 'weekday': 'WEEKDAY', 'saturday': 'SATURDAY', 'sunday_holiday': 'SUN/HOL', 'holiday': 'HOLIDAY' };
            document.getElementById('currentDayLabel').innerText = labelMap[currentDayType] || currentDayType.toUpperCase();
            const dayBtnArea = document.getElementById('dayButtonGroup');
            let btns = (currentRoute === 'to_zenkoji') 
                ? [{id:'weekday', n:'平日'}, {id:'saturday', n:'土曜'}, {id:'sunday_holiday', n:'日祝'}]
                : [{id:'weekday', n:'平日'}, {id:'holiday', n:'休日'}];
            
            dayBtnArea.innerHTML = btns.map(b => `
                <button onclick="switchDay('${b.id}')" 
                class="flex-1 py-2 text-xs rounded-md font-bold ${currentDayType === b.id ? 'active-day' : 'text-slate-500'}">
                ${b.n}</button>`).join('');

            const btnStop1 = document.getElementById('btn-stop1');
            const btnStop2 = document.getElementById('btn-stop2');
            btnStop1.className = (currentStopId === 'stop1' ? 'active-stop' : 'text-slate-500') + ' flex-1 py-3 text-xs font-bold rounded-lg transition-all';
            btnStop2.className = (currentStopId === 'stop2' ? 'active-stop' : 'text-slate-500') + ' flex-1 py-3 text-xs font-bold rounded-lg transition-all';
        }

        function loadData() {
            const path = `timetables/${currentRoute}/${currentStopId}/${currentDayType}`;
            onValue(ref(db, path), (snapshot) => {
                const data = snapshot.val();
                allBusData = data ? Object.values(data).sort((a, b) => a.time.localeCompare(b.time)) : [];
                render(allBusData);
            });
        }

        function render(data) {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const upcoming = data.filter(b => b.time >= timeStr).slice(0, 4);
            const container = document.getElementById('nextBusContainer');

            const getPlatformBadge = (line) => {
                const stopName = document.getElementById('currentStopLabel').innerText;
                if (!stopName.includes("長野駅")) return "";
                const lineStr = String(line);
                let num = "";
                if (["10", "臨10", "11", "16", "17"].includes(lineStr)) num = "①";
                else if (lineStr.startsWith("3")) num = "③";
                else if (lineStr.startsWith("7")) num = "⑦";
                return num ? `<span class="bg-white text-slate-900 text-[10px] font-black px-1.5 py-0.5 rounded shadow-sm border border-slate-300">長野駅${num}</span>` : "";
            };

            if (upcoming.length === 0) {
                container.innerHTML = '<p class="py-10 text-slate-600 border border-dashed border-slate-800 rounded-3xl">運行終了</p>';
            } else {
                container.innerHTML = upcoming.map((b, i) => {
                    const isFirst = i === 0;
                    const platBadge = getPlatformBadge(b.lineNum);
                    const lineStr = String(b.lineNum);
                    let subNote = "";
                    if (lineStr === "31快") {
                        subNote = currentRoute === 'to_zenkoji' 
                            ? `<div class="text-[10px] font-bold mt-1 text-yellow-200/90 animate-pulse">（長野駅まで止まりません）</div>`
                            : `<div class="text-[10px] font-bold mt-1 text-yellow-200/90 animate-pulse">（丹波島橋南まで止まりません）</div>`;
                    } else if ((lineStr === "10" || lineStr === "79") && currentRoute === 'to_zenkoji') {
                        subNote = `<div class="text-[10px] font-bold mt-1 text-yellow-200/90 animate-pulse">（善光寺大門で降りてください）</div>`;
                    }
                    return `<div class="bus-card ${isFirst ? 'bg-blue-600' : 'bg-slate-800'} p-5 rounded-[1.8rem] text-left mb-3 shadow-lg relative">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="flex items-center gap-2 mb-1.5">
                                    ${platBadge}
                                    <span class="${isFirst ? 'bg-white text-blue-600' : 'bg-yellow-500 text-slate-900'} text-[10px] font-black px-1.5 py-0.5 rounded italic leading-none">${b.lineNum}</span>
                                    <span class="text-[10px] font-bold opacity-60 uppercase tracking-widest leading-none">${["1ST","2ND","3RD","4TH"][i]}</span>
                                </div>
                                <h2 class="text-xl font-black leading-tight">${b.destination}</h2>
                                ${subNote}
                            </div>
                            <div class="digital-font text-4xl font-bold ${isFirst ? 'text-white' : 'text-yellow-400'} ml-4">${b.time}</div>
                        </div>
                    </div>`;
                }).join('');
            }

            document.getElementById('fullListContent').innerHTML = data.map(b => {
                const platBadge = getPlatformBadge(b.lineNum);
                const lineStr = String(b.lineNum);
                let listNote = "";
                if (lineStr === "31快") {
                    listNote = currentRoute === 'to_zenkoji' ? '（長野駅まで止まりません）' : '（丹波島橋南まで止まりません）';
                } else if ((lineStr === "10" || lineStr === "79") && currentRoute === 'to_zenkoji') {
                    listNote = '（善光寺大門で降りてください）';
                }
                return `<div class="flex flex-col py-3 border-b border-slate-800/50 ${b.time < timeStr ? 'opacity-20' : ''}">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold flex items-center gap-2">
                            ${platBadge}<span class="text-yellow-500">${b.lineNum}</span><span>${b.destination}</span>
                        </span>
                        <span class="digital-font text-lg">${b.time}</span>
                    </div>
                    ${listNote ? `<div class="text-[9px] text-yellow-600/80 font-bold mt-0.5 ml-7">${listNote}</div>` : ''}
                </div>`;
            }).join('');
        }

        // お知らせ管理
        window.openNews = () => { document.getElementById('newsOverlay').classList.remove('hidden'); loadNews(); };
        window.closeNews = () => { document.getElementById('newsOverlay').classList.add('hidden'); showNewsList(); };
        function loadNews() {
            onValue(ref(db, 'news'), (snapshot) => {
                const data = snapshot.val();
                allNews = data ? Object.values(data).reverse() : [];
                showNewsList();
            });
        }
        window.showNewsList = () => {
            document.getElementById('newsHeader').innerText = "INFORMATION";
            document.getElementById('newsList').classList.remove('hidden');
            document.getElementById('newsDetail').classList.add('hidden');
            document.getElementById('newsList').innerHTML = allNews.map((n, i) => `
                <div onclick="showDetail(${i})" class="bg-slate-900 border border-slate-800 p-5 rounded-2xl active:scale-95 transition-transform">
                    <p class="text-[10px] font-bold text-slate-500 mb-1">${n.date}</p>
                    <h3 class="font-bold text-white text-lg leading-tight">${n.title}</h3>
                    <p class="text-blue-400 text-[10px] mt-3 font-bold">詳しく見る →</p>
                </div>`).join('');
        };
        window.showDetail = (i) => {
            const n = allNews[i];
            document.getElementById('newsHeader').innerText = "DETAILS";
            document.getElementById('newsList').classList.add('hidden');
            document.getElementById('newsDetail').classList.remove('hidden');
            document.getElementById('detailDate').innerText = n.date;
            document.getElementById('detailTitle').innerText = n.title;
            document.getElementById('detailContent').innerText = n.content;
        };

        // 1分ごとの更新
        setInterval(() => {
            updateClock();
            if (allBusData.length > 0) render(allBusData);
        }, 60000);

        window.toggleAllList = () => document.getElementById('fullList').classList.toggle('hidden');

        (async () => {
            updateClock(); // 起動時に即表示
            currentDayType = await checkTodayType();
            updateUI();
            loadData();
        })();
    </script>
</body>
</html>
