<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バスロケ・長野</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #0f172a; }
        .digital-font { font-family: 'Chakra Petch', sans-serif; }
        .bus-card { transition: all 0.4s ease; animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { background-color: #2563eb; color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-10">

    <div class="sticky top-0 z-50 bg-[#0f172a]/95 backdrop-blur-md border-b border-slate-800 shadow-xl">
        <div class="max-w-md mx-auto px-6 pt-5 pb-3">
            <div class="flex justify-between items-center mb-4">
                <div id="liveClock" class="digital-font text-4xl font-bold text-white leading-none">00:00</div>
                <div class="text-right">
                    <p id="currentStopLabel" class="text-lg font-black tracking-tighter text-yellow-400 italic">善光寺大門</p>
                </div>
            </div>
            
            <div class="flex bg-slate-900 rounded-xl p-1 border border-slate-700">
                <button onclick="switchStop('stop1', '善光寺大門')" id="btn-stop1" class="active-tab flex-1 py-2.5 text-xs font-bold rounded-lg transition-all">善光寺大門</button>
                <button onclick="switchStop('stop2', '長野駅')" id="btn-stop2" class="flex-1 py-2.5 text-xs font-bold text-slate-500 rounded-lg transition-all">長野駅</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-6">
        <div id="nextBusContainer" class="space-y-4 text-center">
            </div>

        <button onclick="toggleAllList()" class="w-full mt-8 bg-slate-800/50 border border-slate-700 text-slate-400 py-4 rounded-2xl text-sm font-bold shadow-lg">
            全時刻表を表示
        </button>

        <div id="fullList" class="hidden mt-6 bg-slate-900/80 rounded-3xl p-6 border border-slate-800 shadow-2xl">
            <div id="fullListContent" class="space-y-4 h-[400px] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWcJ5BioNRhqVF7o6GfQJ8ui9OZSWD33M",
            authDomain: "bus-timetable-2d2a1.firebaseapp.com",
            databaseURL: "https://bus-timetable-2d2a1-default-rtdb.firebaseio.com/",
            projectId: "bus-timetable-2d2a1",
            storageBucket: "bus-timetable-2d2a1.firebasestorage.app",
            messagingSenderId: "G-LJCQFRZT8H",
            appId: "1:786927724439:web:ceee42521343fde00306d2"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentStopId = 'stop1';
        let unsubscribe = null; // 前の監視を解除するための変数

        // 時計
        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        // バス停切り替え
        window.switchStop = (id, label) => {
            currentStopId = id;
            document.getElementById('currentStopLabel').innerText = label;
            document.getElementById('btn-stop1').className = id === 'stop1' ? 'active-tab flex-1 py-2.5 text-xs font-bold rounded-lg' : 'flex-1 py-2.5 text-xs font-bold text-slate-500 rounded-lg';
            document.getElementById('btn-stop2').className = id === 'stop2' ? 'active-tab flex-1 py-2.5 text-xs font-bold rounded-lg' : 'flex-1 py-2.5 text-xs font-bold text-slate-500 rounded-lg';
            loadData();
        };

        // Firebaseからリアルタイム読み込み
        function loadData() {
            const busRef = ref(db, `timetables/${currentStopId}`);
            
            // すでに監視中なら一度止める（重複防止）
            onValue(busRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    // Firebaseのデータ（オブジェクト形式か配列形式）を配列に変換してソート
                    const allBusData = Object.values(data).sort((a, b) => a.time.localeCompare(b.time));
                    render(allBusData);
                } else {
                    document.getElementById('nextBusContainer').innerHTML = '<p class="py-10 text-slate-600">時刻データがありません</p>';
                }
            });
        }

        function render(allBusData) {
            const now = new Date();
            const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const upcoming = allBusData.filter(bus => bus.time >= currentTimeStr).slice(0, 3);
            
            const container = document.getElementById('nextBusContainer');
            if (upcoming.length === 0) {
                container.innerHTML = '<p class="py-10 text-slate-600 border border-dashed border-slate-800 rounded-3xl">本日の運行は終了しました</p>';
            } else {
                container.innerHTML = upcoming.map((bus, i) => {
                    const isFirst = i === 0;
                    return `
                    <div class="bus-card ${isFirst ? 'bg-blue-600' : 'bg-slate-800'} p-6 rounded-[2rem] text-left">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="${isFirst ? 'bg-white text-blue-600' : 'bg-yellow-500 text-slate-900'} text-[10px] font-black px-1.5 py-0.5 rounded italic leading-none">${bus.lineNum}</span>
                                    <span class="text-[10px] font-bold opacity-60 uppercase tracking-widest leading-none">${isFirst ? 'Departure' : 'Next'}</span>
                                </div>
                                <h2 class="text-2xl font-black">${bus.destination}</h2>
                            </div>
                            <div class="digital-font text-5xl font-bold ${isFirst ? 'text-white' : 'text-yellow-400'}">${bus.time}</div>
                        </div>
                    </div>`;
                }).join('');
            }

            document.getElementById('fullListContent').innerHTML = allBusData.map(bus => `
                <div class="flex justify-between py-3 border-b border-slate-800/50 ${bus.time < currentTimeStr ? 'opacity-20' : ''}">
                    <span class="text-sm font-bold"><span class="text-yellow-500 mr-2">${bus.lineNum}</span>${bus.destination}</span>
                    <span class="digital-font text-lg">${bus.time}</span>
                </div>`).join('');
        }

        window.toggleAllList = () => document.getElementById('fullList').classList.toggle('hidden');
        
        loadData(); // 起動時に読み込み
    </script>
</body>
</html>
